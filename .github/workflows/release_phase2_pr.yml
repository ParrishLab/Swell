name: release-phase2-pr

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: release-phase2-pr-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux-validation:
    name: linux-validation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run test suite
        run: xvfb-run -a python -m pytest -q tests

      - name: Build python artifacts
        run: PYTHON_BIN=python ./scripts/release/build_python_artifacts.sh

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Run model init smoke test
        run: |
          OUT="$(python scripts/release/run_model_smoke.py | tail -n 1)"
          test "$OUT" = "MODEL_SMOKE:PASS"

      - name: Run segmentation workflow smoke test
        run: |
          OUT="$(python scripts/release/run_segmentation_workflow_smoke.py | tail -n 1)"
          test "$OUT" = "SEGMENTATION_WORKFLOW_SMOKE:PASS"

      - name: Generate compatibility manifest
        run: python scripts/release/generate_compatibility_manifest.py

      - name: Generate checksums
        run: ./scripts/release/generate_checksums.sh

      - name: Verify dist outputs
        run: |
          ls -la dist
          test -f dist/compatibility.json
          test -f dist/SHA256SUMS.txt
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-release-validation-dist
          path: dist/

  macos-arm64-validation:
    name: macos-arm64-validation
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS arm64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_arm64.sh

      - name: Verify macOS arm64 outputs
        run: |
          test -d dist/macos-arm64/SDApp.app
          test -f dist/sdapp-macos-arm64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-validation-dist
          path: dist/

  macos-x86_64-validation:
    name: macos-x86_64-validation
    runs-on: macos-15-intel
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS x86_64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_x86_64.sh

      - name: Verify macOS x86_64 outputs
        run: |
          test -d dist/macos-x86_64/SDApp.app
          test -f dist/sdapp-macos-x86_64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-x86_64-validation-dist
          path: dist/

  windows-validation:
    name: windows-validation
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine pyinstaller

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $out = (python -m sdapp.main --smoke-test | Select-Object -Last 1)
          if ($out -ne "SMOKE_TEST:PASS") { throw "Smoke test failed: $out" }

      - name: Run model init smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_model_smoke.py | Select-Object -Last 1)
          if ($out -ne "MODEL_SMOKE:PASS") { throw "Model smoke failed: $out" }

      - name: Run segmentation workflow smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_segmentation_workflow_smoke.py | Select-Object -Last 1)
          if ($out -ne "SEGMENTATION_WORKFLOW_SMOKE:PASS") { throw "Workflow smoke failed: $out" }

      - name: Build Windows x64 app package
        shell: pwsh
        run: |
          ./scripts/release/build_windows_app_x64.ps1

      - name: Verify Windows package outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/windows-x64/SDApp")) { throw "missing dist/windows-x64/SDApp" }
          if (!(Test-Path "dist/sdapp-windows-x64.zip")) { throw "missing dist/sdapp-windows-x64.zip" }

      - name: Generate compatibility manifest
        run: python scripts/release/generate_compatibility_manifest.py

      - name: Generate checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $out = "dist/SHA256SUMS.txt"
          if (Test-Path $out) { Remove-Item $out -Force }
          Get-ChildItem dist -File | Where-Object { $_.Name -ne "SHA256SUMS.txt" } | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            Add-Content -Path $out -Value "$hash  $($_.Name)"
          }

      - name: Verify dist outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/compatibility.json")) { throw "missing dist/compatibility.json" }
          if (!(Test-Path "dist/SHA256SUMS.txt")) { throw "missing dist/SHA256SUMS.txt" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-release-validation-dist
          path: dist/

