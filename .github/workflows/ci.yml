name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -c requirements/release-py312-constraints.txt -e ".[dev]"
          python -m pip install -c requirements/release-py312-constraints.txt -e ".[model]"

      - name: Run test suite
        run: xvfb-run -a python -m pytest -q tests

      - name: Run startup smoke test
        run: |
          OUT="$(python -m swell.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Run model init smoke test
        run: |
          OUT="$(python scripts/release/run_model_smoke.py --require-runtime | tail -n 1)"
          test "$OUT" = "MODEL_SMOKE:PASS"

      - name: Run segmentation workflow smoke test
        run: |
          OUT="$(python scripts/release/run_segmentation_workflow_smoke.py | tail -n 1)"
          test "$OUT" = "SEGMENTATION_WORKFLOW_SMOKE:PASS"
