name: windows-quick-package

on:
  workflow_dispatch:
    inputs:
      run_tests:
        description: "Run full pytest suite before packaging"
        required: false
        default: false
        type: boolean

concurrency:
  group: windows-quick-package-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-quick-package:
    name: windows-quick-package
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install pytest pyinstaller hydra-core
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch
          if ($LASTEXITCODE -ne 0) {
            Write-Host "CPU-index torch install failed; retrying from default index..."
            python -m pip install torch
          }
          if ($LASTEXITCODE -ne 0) { throw "Failed to install torch on Windows runner." }
          python -m pip install "sam2 @ git+https://github.com/facebookresearch/sam2.git"

      - name: Verify pytest install
        shell: pwsh
        run: |
          python -c "import pytest; print(pytest.__version__)"

      - name: Run test suite (optional)
        if: ${{ inputs.run_tests }}
        run: python -m pytest -q tests

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $out = (python -m sdapp.main --smoke-test | Select-Object -Last 1)
          if ($out -ne "SMOKE_TEST:PASS") { throw "Smoke test failed: $out" }

      - name: Run model init smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_model_smoke.py --require-runtime | Select-Object -Last 1)
          if ($out -ne "MODEL_SMOKE:PASS") { throw "Model smoke failed: $out" }

      - name: Run segmentation workflow smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_segmentation_workflow_smoke.py | Select-Object -Last 1)
          if ($out -ne "SEGMENTATION_WORKFLOW_SMOKE:PASS") { throw "Workflow smoke failed: $out" }

      - name: Build Windows x64 app package
        shell: pwsh
        run: ./scripts/release/build_windows_app_x64.ps1

      - name: Run packaged app model runtime smoke test
        shell: pwsh
        run: |
          $out = (& "dist/windows-x64/SDApp/SDApp.exe" --smoke-test --smoke-model-runtime | Select-Object -Last 1)
          if ($out -ne "SMOKE_TEST:PASS") { throw "Packaged app smoke failed: $out" }

      - name: Run packaged app open-request smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_open_request_smoke.py --app-cmd "dist/windows-x64/SDApp/SDApp.exe" | Select-Object -Last 1)
          if ($out -ne "OPEN_REQUEST_SMOKE:PASS") { throw "Open request smoke failed: $out" }

      - name: Verify Windows package outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/windows-x64/SDApp")) { throw "missing dist/windows-x64/SDApp" }
          if (!(Test-Path "dist/sdapp-windows-x64.zip")) { throw "missing dist/sdapp-windows-x64.zip" }

      - name: Generate compatibility manifest
        run: python scripts/release/generate_compatibility_manifest.py

      - name: Generate checksums
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $out = "dist/SHA256SUMS.txt"
          if (Test-Path $out) { Remove-Item $out -Force }
          Get-ChildItem dist -File | Where-Object { $_.Name -ne "SHA256SUMS.txt" } | Sort-Object Name | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            Add-Content -Path $out -Value "$hash  $($_.Name)"
          }

      - name: Verify dist outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/compatibility.json")) { throw "missing dist/compatibility.json" }
          if (!(Test-Path "dist/SHA256SUMS.txt")) { throw "missing dist/SHA256SUMS.txt" }

      - name: Upload Windows quick package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-quick-package-dist
          path: dist/
