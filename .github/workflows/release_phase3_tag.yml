name: release-phase3-tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release when running manually (for example: v0.1.0)"
        required: false
        type: string

concurrency:
  group: release-phase3-tag-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux-python-artifacts:
    name: linux-python-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run test suite
        run: xvfb-run -a python -m pytest -q tests

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build python artifacts
        run: PYTHON_BIN=python ./scripts/release/build_python_artifacts.sh

      - name: Verify Python artifacts
        run: |
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v5
        with:
          name: linux-python-artifacts-dist
          path: dist/

  macos-arm64-package:
    name: macos-arm64-package
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS arm64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_arm64.sh

      - name: Verify macOS arm64 outputs
        run: |
          test -d dist/macos-arm64/SDApp.app
          test -f dist/sdapp-macos-arm64.zip

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-arm64-package-dist
          path: dist/

  macos-x86_64-package:
    name: macos-x86_64-package
    runs-on: macos-15-intel
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS x86_64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_x86_64.sh

      - name: Verify macOS x86_64 outputs
        run: |
          test -d dist/macos-x86_64/SDApp.app
          test -f dist/sdapp-macos-x86_64.zip

      - name: Upload macOS x86_64 artifacts
        uses: actions/upload-artifact@v5
        with:
          name: macos-x86_64-package-dist
          path: dist/

  windows-runtime-gate:
    name: windows-runtime-gate
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $out = (python -m sdapp.main --smoke-test | Select-Object -Last 1)
          if ($out -ne "SMOKE_TEST:PASS") { throw "Smoke test failed: $out" }

  release-assemble:
    name: release-assemble
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - linux-python-artifacts
      - macos-arm64-package
      - macos-x86_64-package
      - windows-runtime-gate
    outputs:
      release_tag: ${{ steps.resolve_tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ "$TAG" != v* ]]; then
            echo "ERROR: release tag must start with 'v' (got '$TAG')" >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Download Linux artifacts
        uses: actions/download-artifact@v5
        with:
          name: linux-python-artifacts-dist
          path: _artifacts/linux

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-arm64-package-dist
          path: _artifacts/macos-arm64

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-x86_64-package-dist
          path: _artifacts/macos-x86_64

      - name: Collate release artifacts
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          cp _artifacts/linux/*.whl dist/
          cp _artifacts/linux/*.tar.gz dist/
          cp _artifacts/macos-arm64/sdapp-macos-arm64.zip dist/
          cp _artifacts/macos-x86_64/sdapp-macos-x86_64.zip dist/
          ls -la dist

      - name: Generate compatibility manifest
        run: python scripts/release/generate_compatibility_manifest.py

      - name: Generate checksums
        run: ./scripts/release/generate_checksums.sh

      - name: Verify assembled release outputs
        run: |
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null
          test -f dist/sdapp-macos-arm64.zip
          test -f dist/sdapp-macos-x86_64.zip
          test -f dist/compatibility.json
          test -f dist/SHA256SUMS.txt

      - name: Upload assembled release artifacts
        uses: actions/upload-artifact@v5
        with:
          name: release-assembled-dist
          path: dist/

  publish-draft:
    name: publish-draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - release-assemble
    permissions:
      contents: write
    steps:
      - name: Download assembled release artifacts
        uses: actions/download-artifact@v5
        with:
          name: release-assembled-dist
          path: dist

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-assemble.outputs.release_tag }}
          name: ${{ needs.release-assemble.outputs.release_tag }}
          draft: true
          prerelease: ${{ contains(needs.release-assemble.outputs.release_tag, '-rc') || contains(needs.release-assemble.outputs.release_tag, '-beta') || contains(needs.release-assemble.outputs.release_tag, '-alpha') }}
          files: |
            dist/*

# TODO(phase3.5): Add model-init smoke gate.
# TODO(phase3.5): Add segmentation-workflow smoke gate.
# TODO(phase4): Add Windows packaged-binary build/publish jobs.
# TODO(phase4+): Add macOS signing/notarization/stapling.
