name: release-phase3-tag

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release when running manually (for example: v0.1.0)"
        required: false
        type: string

concurrency:
  group: release-phase3-tag-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release-validate:
    name: release-validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.validate.outputs.release_tag }}
      release_version: ${{ steps.validate.outputs.release_version }}
      is_prerelease: ${{ steps.validate.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Resolve release tag
        id: resolve_tag
        shell: bash
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          if [ -z "$TAG" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          if [ -z "$TAG" ]; then
            echo "ERROR: No release tag resolved. Provide workflow input 'release_tag' or run from a v* tag push." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Validate tag, version, and changelog
        id: validate
        run: |
          python scripts/release/validate_release_inputs.py \
            --tag "${{ steps.resolve_tag.outputs.tag }}" \
            --github-output "$GITHUB_OUTPUT"

  linux-python-artifacts:
    name: linux-python-artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - release-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Run test suite
        run: xvfb-run -a python -m pytest -q tests

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Run model init smoke test
        run: |
          OUT="$(python scripts/release/run_model_smoke.py | tail -n 1)"
          test "$OUT" = "MODEL_SMOKE:PASS"

      - name: Run segmentation workflow smoke test
        run: |
          OUT="$(python scripts/release/run_segmentation_workflow_smoke.py | tail -n 1)"
          test "$OUT" = "SEGMENTATION_WORKFLOW_SMOKE:PASS"

      - name: Build python artifacts
        run: PYTHON_BIN=python ./scripts/release/build_python_artifacts.sh

      - name: Verify Python artifacts
        run: |
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v6
        with:
          name: linux-python-artifacts-dist
          path: dist/

  macos-arm64-package:
    name: macos-arm64-package
    runs-on: macos-14
    timeout-minutes: 45
    needs:
      - release-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS arm64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_arm64.sh

      - name: Verify macOS arm64 outputs
        run: |
          test -d dist/macos-arm64/SDApp.app
          test -f dist/sdapp-macos-arm64.zip

      - name: Upload macOS arm64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-arm64-package-dist
          path: dist/

  macos-x86_64-package:
    name: macos-x86_64-package
    runs-on: macos-15-intel
    timeout-minutes: 45
    needs:
      - release-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install pyinstaller

      - name: Run startup smoke test
        run: |
          OUT="$(python -m sdapp.main --smoke-test | tail -n 1)"
          test "$OUT" = "SMOKE_TEST:PASS"

      - name: Build macOS x86_64 app
        run: PYTHON_BIN=python ./scripts/release/build_macos_app_x86_64.sh

      - name: Verify macOS x86_64 outputs
        run: |
          test -d dist/macos-x86_64/SDApp.app
          test -f dist/sdapp-macos-x86_64.zip

      - name: Upload macOS x86_64 artifacts
        uses: actions/upload-artifact@v6
        with:
          name: macos-x86_64-package-dist
          path: dist/

  windows-runtime-gate:
    name: windows-runtime-gate
    runs-on: windows-latest
    timeout-minutes: 45
    needs:
      - release-validate
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]
          python -m pip install build twine pyinstaller

      - name: Run test suite
        run: python -m pytest -q tests

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $out = (python -m sdapp.main --smoke-test | Select-Object -Last 1)
          if ($out -ne "SMOKE_TEST:PASS") { throw "Smoke test failed: $out" }

      - name: Run model init smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_model_smoke.py | Select-Object -Last 1)
          if ($out -ne "MODEL_SMOKE:PASS") { throw "Model smoke failed: $out" }

      - name: Run segmentation workflow smoke test
        shell: pwsh
        run: |
          $out = (python scripts/release/run_segmentation_workflow_smoke.py | Select-Object -Last 1)
          if ($out -ne "SEGMENTATION_WORKFLOW_SMOKE:PASS") { throw "Workflow smoke failed: $out" }

      - name: Build Windows x64 app package
        shell: pwsh
        run: |
          ./scripts/release/build_windows_app_x64.ps1

      - name: Verify Windows package outputs
        shell: pwsh
        run: |
          if (!(Test-Path "dist/windows-x64/SDApp")) { throw "missing dist/windows-x64/SDApp" }
          if (!(Test-Path "dist/sdapp-windows-x64.zip")) { throw "missing dist/sdapp-windows-x64.zip" }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v6
        with:
          name: windows-package-dist
          path: dist/

  release-assemble:
    name: release-assemble
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs:
      - release-validate
      - linux-python-artifacts
      - macos-arm64-package
      - macos-x86_64-package
      - windows-runtime-gate
    outputs:
      release_tag: ${{ needs.release-validate.outputs.release_tag }}
      is_prerelease: ${{ needs.release-validate.outputs.is_prerelease }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Linux artifacts
        uses: actions/download-artifact@v6
        with:
          name: linux-python-artifacts-dist
          path: _artifacts/linux

      - name: Download macOS arm64 artifacts
        uses: actions/download-artifact@v6
        with:
          name: macos-arm64-package-dist
          path: _artifacts/macos-arm64

      - name: Download macOS x86_64 artifacts
        uses: actions/download-artifact@v6
        with:
          name: macos-x86_64-package-dist
          path: _artifacts/macos-x86_64

      - name: Download Windows artifacts
        uses: actions/download-artifact@v6
        with:
          name: windows-package-dist
          path: _artifacts/windows-x64

      - name: Collate release artifacts
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          cp _artifacts/linux/*.whl dist/
          cp _artifacts/linux/*.tar.gz dist/
          cp _artifacts/macos-arm64/sdapp-macos-arm64.zip dist/
          cp _artifacts/macos-x86_64/sdapp-macos-x86_64.zip dist/
          cp _artifacts/windows-x64/sdapp-windows-x64.zip dist/
          ls -la dist

      - name: Generate compatibility manifest
        run: python scripts/release/generate_compatibility_manifest.py

      - name: Generate release notes from changelog
        run: |
          mkdir -p _release
          python scripts/release/generate_release_notes.py \
            --tag "${{ needs.release-validate.outputs.release_tag }}" \
            --output _release/release_notes.md

      - name: Generate checksums
        run: ./scripts/release/generate_checksums.sh

      - name: Verify assembled release outputs
        run: |
          ls dist/*.whl >/dev/null
          ls dist/*.tar.gz >/dev/null
          test -f dist/sdapp-macos-arm64.zip
          test -f dist/sdapp-macos-x86_64.zip
          test -f dist/sdapp-windows-x64.zip
          test -f dist/compatibility.json
          test -f dist/SHA256SUMS.txt
          test -f _release/release_notes.md

      - name: Upload assembled release artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assembled-dist
          path: |
            dist/
            _release/release_notes.md

  publish-draft:
    name: publish-draft
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - release-assemble
    permissions:
      contents: write
    steps:
      - name: Download assembled release artifacts
        uses: actions/download-artifact@v6
        with:
          name: release-assembled-dist
          path: .

      - name: Create or update draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-assemble.outputs.release_tag }}
          name: ${{ needs.release-assemble.outputs.release_tag }}
          draft: true
          prerelease: ${{ needs.release-assemble.outputs.is_prerelease == 'true' }}
          body_path: _release/release_notes.md
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/sdapp-macos-arm64.zip
            dist/sdapp-macos-x86_64.zip
            dist/sdapp-windows-x64.zip
            dist/compatibility.json
            dist/SHA256SUMS.txt

# TODO(phase6): Add packaged app open-file association smoke tests.
# TODO(phase4+): Add macOS signing/notarization/stapling.
